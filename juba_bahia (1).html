<!-- ========================================================
     ORE15.IT · RADAR GIOCATORE · v2.0
     Incolla nel Sorgente del CMS.
     Per cambiare giocatore modifica solo il blocco
     tra START DATI e END DATI.
======================================================== -->

<style>
  .ore15-wrap {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f4f6f9;
    border-radius: 16px;
    padding: 24px 20px;
    max-width: 500px;
    margin: 24px auto;
    color: #1a1f36;
    box-sizing: border-box;
    border: 1px solid #dde2ee;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .ore15-wrap * { box-sizing: border-box; }
  .ore15-header { text-align: center; margin-bottom: 18px; }
  .ore15-sitelabel { font-size: 10px; letter-spacing: 4px; color: #9aa0b8; font-weight: 700; margin-bottom: 4px; }
  .ore15-title { font-size: 20px; font-weight: 800; letter-spacing: 2px; color: #1a1f36; margin: 0; }
  .ore15-divider { height: 2px; background: linear-gradient(90deg, transparent, #e0e4f0, transparent); margin: 10px 0 16px; }
  .ore15-player-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
  .ore15-player-name { font-size: 22px; font-weight: 800; letter-spacing: 1px; margin: 0 0 6px 0; color: #1a1f36; }
  .ore15-player-sub { font-size: 12px; color: #6b7a9e; }
  .ore15-role-badge {
    display: inline-block; border-radius: 5px;
    padding: 2px 8px; font-size: 11px; font-weight: 700;
    letter-spacing: 2px; margin-right: 6px;
  }
  .ore15-radar-svg { display: block; margin: 0 auto 16px; width: 100%; max-width: 340px; }
  .ore15-legend { display: flex; gap: 16px; justify-content: center; margin-bottom: 14px; }
  .ore15-legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; color: #6b7a9e; letter-spacing: 1px; }
  .ore15-legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .ore15-bars { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; margin-bottom: 16px; }
  .ore15-bar-label { display: flex; justify-content: space-between; margin-bottom: 3px; }
  .ore15-bar-key { font-size: 10px; letter-spacing: 2px; color: #9aa0b8; font-weight: 700; }
  .ore15-bar-vals { font-size: 11px; font-weight: 800; }
  .ore15-bar-track { height: 4px; background: #dde2ee; border-radius: 2px; position: relative; }
  .ore15-bar-fill { height: 100%; border-radius: 2px; position: absolute; top: 0; left: 0; }
  .ore15-rawstats { background: #eef0f7; border-radius: 10px; padding: 12px 14px; margin-bottom: 14px; }
  .ore15-rawstats-title { font-size: 10px; letter-spacing: 3px; color: #9aa0b8; margin-bottom: 8px; font-weight: 700; }
  .ore15-rawgrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; text-align: center; }
  .ore15-rawitem { background: #fff; border-radius: 8px; padding: 8px 4px; border: 1px solid #dde2ee; }
  .ore15-rawval { font-size: 18px; font-weight: 800; }
  .ore15-rawkey { font-size: 9px; color: #9aa0b8; letter-spacing: 1px; margin-top: 2px; }
  .ore15-footer { text-align: center; font-size: 9px; letter-spacing: 2px; color: #c0c6d8; margin-top: 10px; }
  .ore15-pei-wrap { text-align: center; flex-shrink: 0; }
  .ore15-mktval { display: inline-block; background: #fff; border: 1px solid #dde2ee; border-radius: 6px; padding: 3px 10px; font-size: 12px; font-weight: 700; color: #1a1f36; margin-top: 6px; }
</style>

<div class="ore15-wrap" id="ore15-root">
  <div class="ore15-header">
    <div class="ore15-sitelabel">ORE15.IT · SCOUT REPORT</div>
    <div class="ore15-title">PROFILO GIOCATORE</div>
  </div>
  <div class="ore15-divider"></div>

  <div class="ore15-player-header">
    <div>
      <div class="ore15-sitelabel" id="o15-competition"></div>
      <div class="ore15-player-name" id="o15-name"></div>
      <div>
        <span class="ore15-role-badge" id="o15-role-badge"></span>
        <span class="ore15-player-sub" id="o15-sub"></span>
      </div>
      <div class="ore15-mktval" id="o15-mktval"></div>
    </div>
    <div class="ore15-pei-wrap">
      <svg id="o15-pei-svg" width="88" height="88" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="38" fill="none" stroke="#dde2ee" stroke-width="8"/>
        <circle id="o15-pei-arc" cx="50" cy="50" r="38" fill="none" stroke-width="8"
          stroke-linecap="round" transform="rotate(-90 50 50)"/>
        <text id="o15-pei-val" x="50" y="44" text-anchor="middle"
          font-size="15" font-weight="800" font-family="'Segoe UI',Arial,sans-serif"></text>
        <text x="50" y="58" text-anchor="middle" fill="#9aa0b8"
          font-size="8" font-family="'Segoe UI',Arial,sans-serif" letter-spacing="2">PEI</text>
      </svg>
    </div>
  </div>

  <div class="ore15-legend">
    <div class="ore15-legend-item">
      <div class="ore15-legend-dot" id="o15-leg-dot"></div>
      <span id="o15-leg-player"></span>
    </div>
    <div class="ore15-legend-item">
      <div class="ore15-legend-dot" style="background:#b0b8d0"></div>
      <span>MEDIA CAMPIONATO</span>
    </div>
  </div>

  <svg class="ore15-radar-svg" id="o15-radar" viewBox="0 0 400 400"></svg>

  <div class="ore15-bars" id="o15-bars"></div>

  <div class="ore15-rawstats">
    <div class="ore15-rawstats-title">INDICI DI PRESTAZIONE</div>
    <div class="ore15-rawgrid" id="o15-rawgrid"></div>
  </div>

  <div class="ore15-footer">Valore di mercato: fonte Transfermarkt</div>
</div>

<script>
(function() {

  /* =====================================================
     START DATI — modifica qui per ogni giocatore
  ===================================================== */
  var PLAYER = {
    name:        "LUCIANO JUBA",
    team:        "BAHIA",
    role:        "TS",
    competition: "Brasileirao",
    age:         26,
    nation:      "BRA",
    pei:         65.5,
    mktValue:    "€ 14M",

    /* Valori reali del tuo sistema */
    offensiva:    14.7,
    difensiva:    22.4,
    bilanciamento:37.5,

    /* Massimi usati per scalare sul radar (non modificare) */
    _maxOff: 26.5,
    _maxDif: 42.1,
    _maxBil: 69.1,
    _maxPei: 117.9,
  };

  var MEDIA = {
    pei:          49.7,
    offensiva:    9.0,
    difensiva:    23.4,
    bilanciamento:38.4,
  };
  /* =====================================================
     END DATI
  ===================================================== */

  var color = "#e63946";  /* rosso ore15 */
  var colorMedia = "#b0b8d0";

  /* Normalizza 0-100 */
  function norm(val, max) { return Math.min(100, Math.round(val / max * 100)); }

  var AXES = [
    { label: "FASE\nOFFENSIVA",  pVal: norm(PLAYER.offensiva, PLAYER._maxOff),    mVal: norm(MEDIA.offensiva, PLAYER._maxOff),    raw: PLAYER.offensiva,    rawM: MEDIA.offensiva },
    { label: "FASE\nDIFENSIVA",  pVal: norm(PLAYER.difensiva, PLAYER._maxDif),    mVal: norm(MEDIA.difensiva, PLAYER._maxDif),    raw: PLAYER.difensiva,    rawM: MEDIA.difensiva },
    { label: "BILANCIAMENTO\nDIF/OFF", pVal: norm(PLAYER.bilanciamento, PLAYER._maxBil), mVal: norm(MEDIA.bilanciamento, PLAYER._maxBil), raw: PLAYER.bilanciamento, rawM: MEDIA.bilanciamento },
    { label: "INDICE\nCOMPLESSIVO", pVal: norm(PLAYER.pei, PLAYER._maxPei),       mVal: norm(MEDIA.pei, PLAYER._maxPei),          raw: PLAYER.pei,          rawM: MEDIA.pei },
  ];

  var N = AXES.length;
  var CX = 200, CY = 200, R = 140;
  var ns = "http://www.w3.org/2000/svg";

  /* --- Testi --- */
  document.getElementById("o15-competition").textContent = PLAYER.competition;
  document.getElementById("o15-name").textContent = PLAYER.name;
  document.getElementById("o15-sub").textContent = PLAYER.team + " · " + PLAYER.nation + " · " + PLAYER.age + " anni";
  document.getElementById("o15-mktval").textContent = "Valore: " + PLAYER.mktValue;
  document.getElementById("o15-leg-player").textContent = PLAYER.name.split(" ").pop();
  document.getElementById("o15-leg-dot").style.background = color;

  var badge = document.getElementById("o15-role-badge");
  badge.textContent = PLAYER.role;
  badge.style.background = color + "18";
  badge.style.color = color;
  badge.style.border = "1px solid " + color + "55";

  /* PEI gauge */
  var r = 38, circ = 2 * Math.PI * r;
  var arc = document.getElementById("o15-pei-arc");
  arc.setAttribute("stroke", color);
  arc.setAttribute("stroke-dasharray", (norm(PLAYER.pei, PLAYER._maxPei) / 100 * circ) + " " + circ);
  var peiVal = document.getElementById("o15-pei-val");
  peiVal.textContent = PLAYER.pei;
  peiVal.setAttribute("fill", color);

  /* --- Radar --- */
  var svg = document.getElementById("o15-radar");

  function pt(angle, radius) {
    return [CX + radius * Math.cos(angle - Math.PI/2), CY + radius * Math.sin(angle - Math.PI/2)];
  }

  /* sfondo */
  var bg = document.createElementNS(ns, "circle");
  bg.setAttribute("cx", CX); bg.setAttribute("cy", CY);
  bg.setAttribute("r", R+24); bg.setAttribute("fill", "#eef0f7");
  svg.appendChild(bg);

  /* rings */
  [0.25,0.5,0.75,1].forEach(function(f) {
    var pts = AXES.map(function(_,i) {
      var p = pt(2*Math.PI*i/N, R*f);
      return p[0]+","+p[1];
    }).join(" ");
    var poly = document.createElementNS(ns, "polygon");
    poly.setAttribute("points", pts);
    poly.setAttribute("fill", "none");
    poly.setAttribute("stroke", f===1 ? "#c8cedd" : "#dde2ee");
    poly.setAttribute("stroke-width", f===1 ? "1.5" : "0.8");
    svg.appendChild(poly);
  });

  /* assi */
  AXES.forEach(function(_,i) {
    var p = pt(2*Math.PI*i/N, R);
    var line = document.createElementNS(ns, "line");
    line.setAttribute("x1",CX); line.setAttribute("y1",CY);
    line.setAttribute("x2",p[0]); line.setAttribute("y2",p[1]);
    line.setAttribute("stroke","#dde2ee"); line.setAttribute("stroke-width","1");
    svg.appendChild(line);
  });

  /* shape media */
  var mPts = AXES.map(function(ax,i) {
    var p = pt(2*Math.PI*i/N, R * ax.mVal/100);
    return p[0]+","+p[1];
  }).join(" ");
  var mShape = document.createElementNS(ns, "polygon");
  mShape.setAttribute("points", mPts);
  mShape.setAttribute("fill", colorMedia);
  mShape.setAttribute("fill-opacity", "0.25");
  mShape.setAttribute("stroke", colorMedia);
  mShape.setAttribute("stroke-width", "2");
  svg.appendChild(mShape);

  /* shape giocatore */
  var pPts = AXES.map(function(ax,i) {
    var p = pt(2*Math.PI*i/N, R * ax.pVal/100);
    return p[0]+","+p[1];
  }).join(" ");
  var pShape = document.createElementNS(ns, "polygon");
  pShape.setAttribute("points", pPts);
  pShape.setAttribute("fill", color);
  pShape.setAttribute("fill-opacity", "0.2");
  pShape.setAttribute("stroke", color);
  pShape.setAttribute("stroke-width", "2.5");
  svg.appendChild(pShape);

  /* dots giocatore */
  AXES.forEach(function(ax,i) {
    var p = pt(2*Math.PI*i/N, R * ax.pVal/100);
    var dot = document.createElementNS(ns, "circle");
    dot.setAttribute("cx",p[0]); dot.setAttribute("cy",p[1]);
    dot.setAttribute("r","5"); dot.setAttribute("fill",color);
    dot.setAttribute("stroke","#f4f6f9"); dot.setAttribute("stroke-width","2");
    svg.appendChild(dot);
  });

  /* etichette assi */
  AXES.forEach(function(ax,i) {
    var p = pt(2*Math.PI*i/N, R+34);
    var lines = ax.label.split("\n");
    var g = document.createElementNS(ns, "g");
    lines.forEach(function(line, li) {
      var txt = document.createElementNS(ns, "text");
      txt.setAttribute("x", p[0]);
      txt.setAttribute("y", p[1] + (li - (lines.length-1)/2) * 13);
      txt.setAttribute("text-anchor","middle");
      txt.setAttribute("dominant-baseline","middle");
      txt.setAttribute("font-size","9");
      txt.setAttribute("font-weight","700");
      txt.setAttribute("fill","#6b7a9e");
      txt.setAttribute("letter-spacing","1");
      txt.setAttribute("font-family","'Segoe UI',Arial,sans-serif");
      txt.textContent = line;
      g.appendChild(txt);
    });
    svg.appendChild(g);
  });

  /* centro */
  var ctr = document.createElementNS(ns, "circle");
  ctr.setAttribute("cx",CX); ctr.setAttribute("cy",CY);
  ctr.setAttribute("r","3"); ctr.setAttribute("fill",color); ctr.setAttribute("opacity","0.4");
  svg.appendChild(ctr);

  /* --- Barre --- */
  var barsEl = document.getElementById("o15-bars");
  AXES.forEach(function(ax) {
    var div = document.createElement("div");
    div.innerHTML =
      '<div class="ore15-bar-label">'+
        '<span class="ore15-bar-key">'+ax.label.replace("\n"," ")+'</span>'+
        '<span class="ore15-bar-vals" style="color:'+color+'">'+ax.raw+
          ' <span style="color:'+colorMedia+';font-size:10px">/ '+ax.rawM+'</span></span>'+
      '</div>'+
      '<div class="ore15-bar-track">'+
        '<div class="ore15-bar-fill" style="width:'+ax.mVal+'%;background:'+colorMedia+'"></div>'+
        '<div class="ore15-bar-fill" style="width:'+ax.pVal+'%;background:'+color+';opacity:0.7"></div>'+
      '</div>';
    barsEl.appendChild(div);
  });

  /* --- Indici box --- */
  var rawEl = document.getElementById("o15-rawgrid");
  var items = [
    { k: "INDICE COMPLESSIVO", v: PLAYER.pei, vm: MEDIA.pei },
    { k: "FASE OFFENSIVA",     v: PLAYER.offensiva, vm: MEDIA.offensiva },
    { k: "FASE DIFENSIVA",     v: PLAYER.difensiva, vm: MEDIA.difensiva },
    { k: "BILANCIAMENTO",      v: PLAYER.bilanciamento, vm: MEDIA.bilanciamento },
  ];
  items.forEach(function(item) {
    var div = document.createElement("div");
    div.className = "ore15-rawitem";
    div.innerHTML =
      '<div class="ore15-rawval" style="color:'+color+'">'+item.v+'</div>'+
      '<div class="ore15-rawkey">'+item.k+'</div>'+
      '<div style="font-size:10px;color:'+colorMedia+';margin-top:2px;">media: '+item.vm+'</div>';
    rawEl.appendChild(div);
  });

})();
</script>
<!-- ======================================================== -->
