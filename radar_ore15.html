<!-- ========================================================
     ORE15.IT · RADAR GIOCATORE · v1.0
     Incolla questo blocco nel Sorgente dell'editor.
     Per cambiare giocatore modifica solo il blocco DATI
     tra i commenti START DATI e END DATI.
======================================================== -->

<style>
  .ore15-radar-wrap {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0a0d1a;
    border-radius: 16px;
    padding: 24px 20px;
    max-width: 480px;
    margin: 24px auto;
    color: #e8eaf6;
    box-sizing: border-box;
  }
  .ore15-radar-wrap * { box-sizing: border-box; }
  .ore15-header { text-align: center; margin-bottom: 18px; }
  .ore15-label { font-size: 10px; letter-spacing: 4px; color: #3a4060; font-weight: 700; margin-bottom: 4px; }
  .ore15-title { font-size: 22px; font-weight: 800; letter-spacing: 2px; color: #e8eaf6; margin: 0; }
  .ore15-player-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
  .ore15-player-name { font-size: 22px; font-weight: 800; letter-spacing: 1px; margin: 0 0 6px 0; }
  .ore15-player-sub { font-size: 12px; color: #4a5568; }
  .ore15-role-badge {
    display: inline-block; border-radius: 5px;
    padding: 2px 8px; font-size: 11px; font-weight: 700;
    letter-spacing: 2px; margin-right: 6px;
  }
  .ore15-radar-svg { display: block; margin: 0 auto 16px; width: 100%; max-width: 340px; }
  .ore15-bars { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; margin-bottom: 16px; }
  .ore15-bar-label { display: flex; justify-content: space-between; margin-bottom: 3px; }
  .ore15-bar-key { font-size: 10px; letter-spacing: 2px; color: #4a5568; font-weight: 700; }
  .ore15-bar-val { font-size: 12px; font-weight: 800; }
  .ore15-bar-track { height: 3px; background: #1a2035; border-radius: 2px; }
  .ore15-bar-fill { height: 100%; border-radius: 2px; opacity: 0.75; }
  .ore15-rawstats { background: #0d1120; border-radius: 10px; padding: 12px 14px; margin-bottom: 16px; }
  .ore15-rawstats-title { font-size: 10px; letter-spacing: 3px; color: #3a4060; margin-bottom: 8px; font-weight: 700; }
  .ore15-rawgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px 0; text-align: center; }
  .ore15-rawval { font-size: 18px; font-weight: 800; color: #c8cde8; }
  .ore15-rawkey { font-size: 9px; color: #3a4060; letter-spacing: 1px; }
  .ore15-footer { text-align: center; font-size: 9px; letter-spacing: 2px; color: #1e2740; margin-top: 12px; }
  .ore15-pei-wrap { text-align: center; }
  .ore15-pei-wrap svg { display: block; margin: 0 auto; }
</style>

<div class="ore15-radar-wrap" id="ore15-radar-root">

  <div class="ore15-header">
    <div class="ore15-label">ORE15.IT · SCOUT REPORT</div>
    <div class="ore15-title">PROFILO GIOCATORE</div>
  </div>

  <div class="ore15-player-header">
    <div>
      <div class="ore15-label" id="o15-competition"></div>
      <div class="ore15-player-name" id="o15-name"></div>
      <div>
        <span class="ore15-role-badge" id="o15-role-badge"></span>
        <span class="ore15-player-sub" id="o15-sub"></span>
      </div>
    </div>
    <div class="ore15-pei-wrap">
      <svg id="o15-pei-svg" width="88" height="88" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="38" fill="none" stroke="#1e2235" stroke-width="8"/>
        <circle id="o15-pei-arc" cx="50" cy="50" r="38" fill="none" stroke-width="8"
          stroke-linecap="round" transform="rotate(-90 50 50)"/>
        <text id="o15-pei-val" x="50" y="46" text-anchor="middle"
          font-size="18" font-weight="800" font-family="'Segoe UI',Arial,sans-serif"></text>
        <text x="50" y="62" text-anchor="middle" fill="#6b7a9e"
          font-size="9" font-family="'Segoe UI',Arial,sans-serif" letter-spacing="2">PEI</text>
      </svg>
    </div>
  </div>

  <svg class="ore15-radar-svg" id="o15-radar" viewBox="0 0 400 400"></svg>

  <div class="ore15-bars" id="o15-bars"></div>

  <div class="ore15-rawstats">
    <div class="ore15-rawstats-title">STATISTICHE GREZZE</div>
    <div class="ore15-rawgrid" id="o15-rawgrid"></div>
  </div>

  <div class="ore15-footer">ORE15.IT · PLAYER EVALUATION INDEX · * Dati raccolti su max 2 partite</div>
</div>

<script>
(function() {

  /* =====================================================
     START DATI — modifica qui per ogni giocatore
  ===================================================== */
  var PLAYER = {
    name:        "ENZO COPETTI",
    team:        "RACING CLUB",
    role:        "AS",
    competition: "Campionato Argentina",
    age:         28,
    nation:      "ARG",
    pei:         82,

    /* Indici 0-100: attacco, difesa, passaggi, duelli, dribbling, bilanciamento */
    stats: {
      "ATTACCO":      88,
      "DIFESA":       41,
      "PASSAGGI":     67,
      "DUELLI":       79,
      "DRIBBLING":    74,
      "BILANCIAMENTO":62
    },

    /* Statistiche grezze da mostrare in basso */
    raw: [
      { k: "GOL",       v: 14 },
      { k: "TIRI",      v: 74 },
      { k: "ASSIST",    v: 5  },
      { k: "CROSS",     v: 12 },
      { k: "INTERCETTI",v: 18 },
      { k: "FALLI SUB", v: 38 },
      { k: "PASS.CHIAVE",v:22 },
      { k: "DRIBBL.V.", v: 31 },
      { k: "AEREI V.",  v: 58 }
    ]
  };
  /* =====================================================
     END DATI
  ===================================================== */

  /* Colori per ruolo */
  var ROLE_COLORS = {
    AS:"#f97316", TS:"#f97316",
    TD:"#3b82f6", DC:"#3b82f6",
    CC:"#10b981", TQ:"#a855f7",
    AD:"#eab308", PO:"#6366f1"
  };
  var color = ROLE_COLORS[PLAYER.role] || "#00d4ff";

  /* --- Popola testo --- */
  document.getElementById("o15-competition").textContent = PLAYER.competition;
  document.getElementById("o15-name").textContent = PLAYER.name;
  document.getElementById("o15-sub").textContent =
    PLAYER.team + " · " + PLAYER.nation + " · " + PLAYER.age + " anni";

  var badge = document.getElementById("o15-role-badge");
  badge.textContent = PLAYER.role;
  badge.style.background = color + "22";
  badge.style.color = color;
  badge.style.border = "1px solid " + color + "55";

  /* --- PEI gauge --- */
  var r = 38, circ = 2 * Math.PI * r;
  var arc = document.getElementById("o15-pei-arc");
  arc.setAttribute("stroke", color);
  arc.setAttribute("stroke-dasharray", (PLAYER.pei / 100 * circ) + " " + circ);
  arc.style.filter = "drop-shadow(0 0 6px " + color + ")";
  var peiVal = document.getElementById("o15-pei-val");
  peiVal.textContent = PLAYER.pei;
  peiVal.setAttribute("fill", color);

  /* --- Radar SVG --- */
  var AXES = Object.keys(PLAYER.stats);
  var N = AXES.length;
  var CX = 200, CY = 200, R = 148;
  var svg = document.getElementById("o15-radar");
  var ns = "http://www.w3.org/2000/svg";

  function pt(angle, r) {
    return [
      CX + r * Math.cos(angle - Math.PI / 2),
      CY + r * Math.sin(angle - Math.PI / 2)
    ];
  }

  /* background */
  var bgCirc = document.createElementNS(ns, "circle");
  bgCirc.setAttribute("cx", CX); bgCirc.setAttribute("cy", CY);
  bgCirc.setAttribute("r", R + 22); bgCirc.setAttribute("fill", "#111525");
  svg.appendChild(bgCirc);

  /* grid rings */
  [0.25, 0.5, 0.75, 1].forEach(function(frac) {
    var pts = AXES.map(function(_, i) {
      var a = 2 * Math.PI * i / N;
      var p = pt(a, R * frac);
      return p[0] + "," + p[1];
    }).join(" ");
    var poly = document.createElementNS(ns, "polygon");
    poly.setAttribute("points", pts);
    poly.setAttribute("fill", "none");
    poly.setAttribute("stroke", frac === 1 ? "#2a3050" : "#1a2035");
    poly.setAttribute("stroke-width", frac === 1 ? "1.5" : "0.8");
    svg.appendChild(poly);
  });

  /* axis lines */
  AXES.forEach(function(_, i) {
    var a = 2 * Math.PI * i / N;
    var p = pt(a, R);
    var line = document.createElementNS(ns, "line");
    line.setAttribute("x1", CX); line.setAttribute("y1", CY);
    line.setAttribute("x2", p[0]); line.setAttribute("y2", p[1]);
    line.setAttribute("stroke", "#1e2740"); line.setAttribute("stroke-width", "1");
    svg.appendChild(line);
  });

  /* filled shape */
  var shapePts = AXES.map(function(axis, i) {
    var a = 2 * Math.PI * i / N;
    var v = (PLAYER.stats[axis] || 0) / 100;
    var p = pt(a, R * v);
    return p[0] + "," + p[1];
  }).join(" ");
  var shape = document.createElementNS(ns, "polygon");
  shape.setAttribute("points", shapePts);
  shape.setAttribute("fill", color);
  shape.setAttribute("fill-opacity", "0.18");
  shape.setAttribute("stroke", color);
  shape.setAttribute("stroke-width", "2.5");
  shape.style.filter = "drop-shadow(0 0 8px " + color + ")";
  svg.appendChild(shape);

  /* dots */
  AXES.forEach(function(axis, i) {
    var a = 2 * Math.PI * i / N;
    var v = (PLAYER.stats[axis] || 0) / 100;
    var p = pt(a, R * v);
    var dot = document.createElementNS(ns, "circle");
    dot.setAttribute("cx", p[0]); dot.setAttribute("cy", p[1]);
    dot.setAttribute("r", "4");
    dot.setAttribute("fill", color);
    dot.setAttribute("stroke", "#0a0d1a"); dot.setAttribute("stroke-width", "2");
    dot.style.filter = "drop-shadow(0 0 4px " + color + ")";
    svg.appendChild(dot);
  });

  /* labels */
  AXES.forEach(function(axis, i) {
    var a = 2 * Math.PI * i / N;
    var p = pt(a, R + 26);
    var txt = document.createElementNS(ns, "text");
    txt.setAttribute("x", p[0]); txt.setAttribute("y", p[1]);
    txt.setAttribute("text-anchor", "middle");
    txt.setAttribute("dominant-baseline", "middle");
    txt.setAttribute("font-size", "11");
    txt.setAttribute("font-weight", "700");
    txt.setAttribute("fill", "#6b7a9e");
    txt.setAttribute("letter-spacing", "2");
    txt.setAttribute("font-family", "'Segoe UI',Arial,sans-serif");
    txt.textContent = axis;
    svg.appendChild(txt);
  });

  /* center dot */
  var ctr = document.createElementNS(ns, "circle");
  ctr.setAttribute("cx", CX); ctr.setAttribute("cy", CY);
  ctr.setAttribute("r", "3"); ctr.setAttribute("fill", color); ctr.setAttribute("opacity", "0.4");
  svg.appendChild(ctr);

  /* --- Barre indici --- */
  var barsEl = document.getElementById("o15-bars");
  AXES.forEach(function(axis) {
    var val = PLAYER.stats[axis];
    var div = document.createElement("div");
    div.innerHTML =
      '<div class="ore15-bar-label">' +
        '<span class="ore15-bar-key">' + axis + '</span>' +
        '<span class="ore15-bar-val" style="color:' + color + '">' + val + '</span>' +
      '</div>' +
      '<div class="ore15-bar-track">' +
        '<div class="ore15-bar-fill" style="width:' + val + '%;background:' + color + '"></div>' +
      '</div>';
    barsEl.appendChild(div);
  });

  /* --- Statistiche grezze --- */
  var rawEl = document.getElementById("o15-rawgrid");
  PLAYER.raw.forEach(function(item) {
    var div = document.createElement("div");
    div.innerHTML =
      '<div class="ore15-rawval">' + item.v + '</div>' +
      '<div class="ore15-rawkey">' + item.k + '</div>';
    rawEl.appendChild(div);
  });

})();
</script>
<!-- ======================================================== -->
