  ["valutaz","defIdx","offIdx","equilibrio","mktValue"].forEach(function(key){var th=document.getElementById("th-"+key);if(!th)return;th.onclick=function(){document.querySelectorAll("thead th").forEach(function(t){t.classList.remove("sorted");if(t.textContent.slice(-2)===" ↓")t.textContent=t.textContent.slice(0,-2)});state.sort=key;state.page=1;th.classList.add("sorted");th.textContent+=" ↓";document.getElementById("r-sort").value=key;render()}});
  document.getElementById("r-anno").onchange=function(){state.anno=this.value;state.page=1;render()};
  document.getElementById("r-comp").onchange=function(){state.comp=this.value;state.page=1;render()};
  document.getElementById("r-role").onchange=function(){state.role=this.value;state.page=1;render()};
  document.getElementById("r-age").onchange=function(){state.age=this.value;state.page=1;render()};
  document.getElementById("r-sort").onchange=function(){state.sort=this.value;state.page=1;document.querySelectorAll("thead th").forEach(function(t){t.classList.remove("sorted");if(t.textContent.slice(-2)===" ↓")t.textContent=t.textContent.slice(0,-2)});var th=document.getElementById("th-"+state.sort);if(th){th.classList.add("sorted");th.textContent+=" ↓"}render()};
  render();
})();
</script>
