    tbody.innerHTML = "";
    slice.forEach(function(p, i) {
      var rank = (state.page-1)*PAGE_SIZE + i + 1;
      var tr = document.createElement("tr");
      tr.innerHTML =
        '<td class="r-rank">'+rank+'</td>'+
        '<td><div class="r-name">'+p.name+'<span class="r-anno">'+p.anno+'</span></div><div class="r-team">'+p.team+'</div></td>'+
        '<td><span class="r-badge">'+p.role+'</span></td>'+
        '<td class="r-comp">'+(COMP_LABELS[p.competition]||p.competition)+'</td>'+
        '<td><span class="r-val">'+p.valutaz.toFixed(1)+'</span><div class="r-bar-bg"><div class="r-bar-fill" style="width:'+(p.valutaz/maxV*100).toFixed(0)+'%;background:#e63946"></div></div></td>'+
        '<td><span class="r-num">'+p.defIdx.toFixed(1)+'</span><div class="r-bar-bg"><div class="r-bar-fill" style="width:'+(p.defIdx/maxD*100).toFixed(0)+'%;background:#3b82f6"></div></div></td>'+
        '<td><span class="r-num">'+p.offIdx.toFixed(1)+'</span><div class="r-bar-bg"><div class="r-bar-fill" style="width:'+(p.offIdx/maxO*100).toFixed(0)+'%;background:#10b981"></div></div></td>'+
        '<td><span class="r-num">'+p.equilibrio.toFixed(1)+'</span><div class="r-bar-bg"><div class="r-bar-fill" style="width:'+(p.equilibrio/maxE*100).toFixed(0)+'%;background:#a855f7"></div></div></td>'+
        '<td class="r-mkt">€'+p.mktValue+'M</td>';
      tbody.appendChild(tr);
    });

    // Pagination
    var pagesEl = document.getElementById("r-pages");
    pagesEl.innerHTML = "";
    var start = Math.max(1, state.page-2);
    var end = Math.min(pages, state.page+2);
    if (start > 1) addBtn(pagesEl, 1, "1");
    if (start > 2) pagesEl.innerHTML += '<span style="padding:5px 4px;color:#9aa0b8">...</span>';
    for (var pg=start; pg<=end; pg++) addBtn(pagesEl, pg, pg);
    if (end < pages-1) pagesEl.innerHTML += '<span style="padding:5px 4px;color:#9aa0b8">...</span>';
    if (end < pages) addBtn(pagesEl, pages, pages);
  }

  function addBtn(el, pg, label) {
    var btn = document.createElement("button");
    btn.className = "r-page-btn"+(pg===state.page?" active":"");
    btn.textContent = label;
    btn.onclick = function(){ state.page=pg; render(); window.scrollTo(0,0); };
    el.appendChild(btn);
  }

  ["valutaz","defIdx","offIdx","equilibrio","mktValue"].forEach(function(key) {
    var th = document.getElementById("th-"+key);
    if(!th) return;
    th.onclick = function(){
      document.querySelectorAll("thead th").forEach(function(t){ t.classList.remove("sorted"); if(t.textContent.slice(-2)===" ↓") t.textContent=t.textContent.slice(0,-2); });
      state.sort=key; state.page=1;
      th.classList.add("sorted"); th.textContent+=" ↓";
      document.getElementById("r-sort").value=key;
      render();
    };
  });

  document.getElementById("r-anno").onchange = function(){ state.anno=this.value; state.page=1; render(); };
  document.getElementById("r-comp").onchange = function(){ state.comp=this.value; state.page=1; render(); };
  document.getElementById("r-role").onchange = function(){ state.role=this.value; state.page=1; render(); };
  document.getElementById("r-sort").onchange = function(){
    state.sort=this.value; state.page=1;
    document.querySelectorAll("thead th").forEach(function(t){ t.classList.remove("sorted"); if(t.textContent.slice(-2)===" ↓") t.textContent=t.textContent.slice(0,-2); });
    var th=document.getElementById("th-"+state.sort);
    if(th){ th.classList.add("sorted"); th.textContent+=" ↓"; }
    render();
  };

  render();
})();
</script>
