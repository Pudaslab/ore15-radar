<!-- ORE15.IT · WIDGET PARTITA MONDIALE · v3.0 -->
<style>
  .mw-wrap{font-family:"Segoe UI",Arial,sans-serif;background:#f4f6f9;border-radius:16px;padding:20px 16px;max-width:500px;margin:20px auto;color:#1a1f36;box-sizing:border-box;border:1px solid #dde2ee;box-shadow:0 4px 24px rgba(0,0,0,.07)}
  .mw-wrap *{box-sizing:border-box}
  .mw-sitelabel{font-size:10px;letter-spacing:4px;color:#9aa0b8;font-weight:700;text-align:center;margin-bottom:4px}
  .mw-competition{font-size:11px;color:#9aa0b8;text-align:center;margin-bottom:16px}
  .mw-scoreboard{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:20px;padding:16px;background:#fff;border-radius:12px;border:1px solid #dde2ee}
  .mw-team{text-align:center}
  .mw-flag{width:52px;height:36px;border-radius:4px;margin:0 auto 8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.15)}
  .mw-flag img{width:100%;height:100%;object-fit:cover}
  .mw-team-name{font-size:14px;font-weight:800;color:#1a1f36;margin-bottom:2px}
  .mw-team-code{font-size:11px;color:#9aa0b8}
  .mw-score{font-size:36px;font-weight:800;color:#1a1f36;letter-spacing:3px;text-align:center}
  .mw-score-label{font-size:10px;color:#9aa0b8;letter-spacing:2px;margin-top:3px;text-align:center}
  .mw-divider{height:1px;background:#eef0f7;margin:0 0 16px}
  .mw-idx-title{font-size:10px;letter-spacing:3px;color:#9aa0b8;font-weight:700;text-align:center;margin-bottom:14px}
  .mw-idx-row{margin-bottom:14px}
  .mw-bar{display:flex;height:6px;gap:2px;align-items:center}
  .mw-bar-left{flex:1;display:flex;justify-content:flex-end}
  .mw-bar-right{flex:1;display:flex;justify-content:flex-start}
  .mw-bar-fill{height:100%;border-radius:3px}
  .mw-bar-sep{width:2px;height:100%;background:#dde2ee;border-radius:1px;flex-shrink:0}
  .mw-tot{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px}
  .mw-tot-card{text-align:center;padding:14px;border-radius:12px}
  .mw-tot-flag{width:40px;height:28px;border-radius:3px;margin:0 auto 6px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.15)}
  .mw-tot-flag img{width:100%;height:100%;object-fit:cover}
  .mw-tot-name{font-size:11px;color:#9aa0b8;margin-bottom:6px}
  .mw-tot-val{font-size:28px;font-weight:800}
  .mw-tot-bar-wrap{height:5px;background:#eef0f7;border-radius:3px;margin-top:8px}
  .mw-tot-bar{height:100%;border-radius:3px}
  .mw-footer{text-align:center;font-size:9px;letter-spacing:2px;color:#c0c6d8;margin-top:14px}
</style>

<div class="mw-wrap">
  <div class="mw-sitelabel">ORE15.IT · ANALISI PARTITA</div>
  <div class="mw-competition">MUNDIAL · Giornata 1</div>

  <div class="mw-scoreboard">
    <div class="mw-team">
      <div class="mw-flag"><img src="https://flagcdn.com/w80/mx.png" alt="Messico" onerror="this.style.display='none'"></div>
      <div class="mw-team-name">Messico</div>
      <div class="mw-team-code">MEX</div>
    </div>
    <div>
      <div class="mw-score">2 – 0</div>
      <div class="mw-score-label">FINALE</div>
    </div>
    <div class="mw-team">
      <div class="mw-flag"><img src="https://flagcdn.com/w80/za.png" alt="Sudafrica" onerror="this.style.display='none'"></div>
      <div class="mw-team-name">Sudafrica</div>
      <div class="mw-team-code">SOU</div>
    </div>
  </div>

  <div class="mw-divider"></div>
  <div class="mw-idx-title">INDICI EFFICACIA ORE15</div>
  <div id="mw-indices"></div>

  <div class="mw-divider"></div>
  <div class="mw-idx-title">INDICE TOTALE EFFICACIA</div>
  <div class="mw-tot" id="mw-tot"></div>

  <div class="mw-footer">Indici proprietari ore15.it · Sistema di valutazione esclusivo</div>
</div>

<script>
(function(){
  var MC='#CC0001',RC='#007A4D',MBG='#FFF0F0',RBG='#F0FFF5';
  var IDX=[{"label": "Attacco", "v1": 55.8, "v2": 1.5}, {"label": "Difesa", "v1": 44.7, "v2": 25.7}, {"label": "Possesso", "v1": 76.2, "v2": 48.7}, {"label": "Passaggi", "v1": 41.4, "v2": 32.1}, {"label": "Disciplina", "v1": 60.2, "v2": 38.9}, {"label": "Età media", "v1": 22.0, "v2": 30.0}];
  var TOT={v1:16.62,v2:2.86};
  var F1='mx',F2='za',N1='Messico',N2='Sudafrica';

  var ic=document.getElementById('mw-indices');
  IDX.forEach(function(idx){
    var w1=idx.v1>=idx.v2;
    ic.innerHTML+=
      '<div class="mw-idx-row">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'+
          '<div style="min-width:80px;text-align:left">'+
            '<span style="font-size:'+(w1?'22px':'14px')+';font-weight:800;color:'+(w1?MC:'#c0c6d8')+'">'+idx.v1.toFixed(1)+'</span>'+
            (w1?'<span style="display:inline-block;font-size:9px;padding:1px 5px;border-radius:20px;font-weight:700;background:'+MBG+';color:'+MC+';margin-left:3px;vertical-align:middle">↑</span>':'')+
          '</div>'+
          '<span style="font-size:11px;color:#9aa0b8;flex:1;text-align:center">'+idx.label+'</span>'+
          '<div style="min-width:80px;text-align:right">'+
            (!w1?'<span style="display:inline-block;font-size:9px;padding:1px 5px;border-radius:20px;font-weight:700;background:'+RBG+';color:'+RC+';margin-right:3px;vertical-align:middle">↑</span>':'')+
            '<span style="font-size:'+(!w1?'22px':'14px')+';font-weight:800;color:'+(!w1?RC:'#c0c6d8')+'">'+idx.v2.toFixed(1)+'</span>'+
          '</div>'+
        '</div>'+
        '<div class="mw-bar">'+
          '<div class="mw-bar-left"><div class="mw-bar-fill" style="width:'+idx.v1+'%;background:'+(w1?MC:'#e8eaef')+'"></div></div>'+
          '<div class="mw-bar-sep"></div>'+
          '<div class="mw-bar-right"><div class="mw-bar-fill" style="width:'+idx.v2+'%;background:'+(!w1?RC:'#e8eaef')+'"></div></div>'+
        '</div>'+
      '</div>';
  });

  var maxA=Math.max(Math.abs(TOT.v1),Math.abs(TOT.v2))||1;
  var w1=Math.round(Math.abs(TOT.v1)/maxA*100);
  var w2=Math.round(Math.abs(TOT.v2)/maxA*100);
  var mw=TOT.v1>=TOT.v2;
  document.getElementById('mw-tot').innerHTML=
    '<div class="mw-tot-card" style="background:'+(mw?MBG:'#eef0f7')+';border:'+(mw?'1.5px solid '+MC:'1px solid #dde2ee')+'">'+
      '<div class="mw-tot-flag"><img src="https://flagcdn.com/w80/'+F1+'.png" onerror="this.style.display='none'"></div>'+
      '<div class="mw-tot-name">'+N1+'</div>'+
      '<div class="mw-tot-val" style="color:'+(mw?MC:'#1a1f36')+'">'+TOT.v1.toFixed(1)+'</div>'+
      '<div class="mw-tot-bar-wrap"><div class="mw-tot-bar" style="width:'+w1+'%;background:'+MC+'"></div></div>'+
    '</div>'+
    '<div class="mw-tot-card" style="background:'+(!mw?RBG:'#eef0f7')+';border:'+(!mw?'1.5px solid '+RC:'1px solid #dde2ee')+'">'+
      '<div class="mw-tot-flag"><img src="https://flagcdn.com/w80/'+F2+'.png" onerror="this.style.display='none'"></div>'+
      '<div class="mw-tot-name">'+N2+'</div>'+
      '<div class="mw-tot-val" style="color:'+(!mw?RC:'#1a1f36')+'">'+TOT.v2.toFixed(1)+'</div>'+
      '<div class="mw-tot-bar-wrap"><div class="mw-tot-bar" style="width:'+w2+'%;background:'+RC+'"></div></div>'+
    '</div>';
})();
</script>
<!-- ======================================================== -->
